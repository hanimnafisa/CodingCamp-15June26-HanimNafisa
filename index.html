<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">

    <!-- Theme Toggle -->
    <div class="theme-bar">
      <span class="theme-label">Theme:</span>
      <button class="theme-btn active" data-theme="light" title="Light">☀️ Light</button>
      <button class="theme-btn" data-theme="dark" title="Dark">🌙 Dark</button>
      <button class="theme-btn" data-theme="coquette" title="Coquette">🎀 Coquette</button>
    </div>

    <!-- Greeting Card -->
    <section class="card greeting-card">
      <div class="greeting-time" id="clock">00:00:00</div>
      <div class="greeting-date" id="date-display"></div>
      <div class="greeting-text" id="greeting-text"></div>
    </section>

    <!-- Main Grid -->
    <div class="grid">

      <!-- Focus Timer Card -->
      <section class="card timer-card">
        <h2 class="card-title">⏱ Focus Timer</h2>
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-progress-wrap">
          <div class="timer-progress-bar" id="timer-progress-bar"></div>
        </div>
        <div class="timer-controls">
          <button class="btn btn-primary" id="timer-start">Start</button>
          <button class="btn btn-secondary" id="timer-stop">Stop</button>
          <button class="btn btn-ghost" id="timer-reset">Reset</button>
        </div>
        <div class="timer-duration-wrap">
          <label for="timer-duration">Duration (min):</label>
          <input type="number" id="timer-duration" min="1" max="120" value="25" />
        </div>
      </section>

      <!-- To-Do List Card -->
      <section class="card todo-card">
        <h2 class="card-title">✅ To-Do List</h2>
        <div class="todo-add">
          <input type="text" id="todo-input" placeholder="Add a new task…" maxlength="100" />
          <button class="btn btn-primary" id="todo-add-btn">Add</button>
        </div>
        <div class="todo-sort-bar">
          <span class="sort-label">Sort:</span>
          <button class="sort-btn active" data-sort="default">Default</button>
          <button class="sort-btn" data-sort="az">A–Z</button>
          <button class="sort-btn" data-sort="za">Z–A</button>
          <button class="sort-btn" data-sort="done">Done last</button>
        </div>
        <ul class="todo-list" id="todo-list"></ul>
        <p class="todo-empty" id="todo-empty">No tasks yet. Add one above!</p>
      </section>

      <!-- Quick Links Card -->
      <section class="card links-card">
        <h2 class="card-title">🔗 Quick Links</h2>
        <div class="links-grid" id="links-grid"></div>
        <p class="links-empty" id="links-empty">No links yet. Add one below!</p>
        <div class="links-add-form">
          <input type="text" id="link-name-input" placeholder="Link name" maxlength="30" />
          <input type="url" id="link-url-input" placeholder="https://example.com" />
          <button class="btn btn-primary" id="link-add-btn">Add Link</button>
        </div>
      </section>

    </div>
  </div>

  <!-- Edit Task Modal -->
  <div class="modal-overlay" id="edit-modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modal-title">
      <h3 id="modal-title">Edit Task</h3>
      <input type="text" id="edit-task-input" maxlength="100" />
      <div class="modal-actions">
        <button class="btn btn-primary" id="edit-save-btn">Save</button>
        <button class="btn btn-ghost" id="edit-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
